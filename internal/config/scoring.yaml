severity:
  critical: 100
  high: 75
  medium: 50
  low: 25
  info: 10
  default: 0

reliability:
  # Map specific sources to their trust level (0.0 - 1.0)
  sources:
    leakix: 1.0
    shodan-verified: 1.0
    shodan: 0.8
    censys: 0.85
    virustotal: 0.8
    alienvault: 0.6
  default: 0.6

business_logic:
  # Rules for multiplier based on keywords in evidence
  # Higher multiplier = higher risk
  rules:
    - name: "Exposed Credentials / Secrets"
      keywords: [".env", "config", "git"]
      multiplier: 2.0
    
    - name: "Exposed Documentation"
      keywords: ["swagger", "openapi"]
      multiplier: 1.5
    
    - name: "Exposed Admin Panels"
      keywords: ["admin", "dashboard", "login"]
      multiplier: 1.2

  default_multiplier: 1.0

ai:
  enabled: true
  provider: "gemini" # or "openai", "groq"
  model: "gemini-2.5-flash" # or "gpt-4o", "llama3-70b-8192"
